openapi: 3.0.3
info:
  title: OpenMEP REST API
  version: 1.0.0
  description: REST API for the Open Manufacturing Engineering Platform MVP.
servers:
  - url: /api
paths:
  /projects/list.php:
    get:
      summary: List projects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /projects/create.php:
    post:
      summary: Create project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ProjectInput'
      responses:
        '201':
          description: Created project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '400':
          $ref: '#/components/responses/ValidationError'
  /projects/update.php:
    post:
      summary: Update project
      responses:
        '200':
          description: Updated project
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
        '404':
          $ref: '#/components/responses/ApiError'
  /projects/delete.php:
    post:
      summary: Delete project
      responses:
        '200':
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /layout/load.php:
    get:
      summary: Load project layout
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Layout elements
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /layout/save.php:
    post:
      summary: Save complete project layout
      responses:
        '200':
          description: Saved layout
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /process/load.php:
    get:
      summary: Load process model
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Process model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /process/save.php:
    post:
      summary: Save process model
      responses:
        '200':
          description: Saved process model
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /process/validate.php:
    post:
      summary: Validate process model
      responses:
        '200':
          description: Validation result
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /resources/list.php:
    get:
      summary: List resources
      parameters:
        - $ref: '#/components/parameters/ProjectId'
      responses:
        '200':
          description: Resource list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /resources/save.php:
    post:
      summary: Save resource
      responses:
        '200':
          description: Saved resource
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /resources/delete.php:
    post:
      summary: Delete resource
      responses:
        '200':
          description: Resource deleted
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /simulation/run.php:
    post:
      summary: Run simulation
      responses:
        '200':
          description: Simulation run completed or started
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /simulation/status.php:
    get:
      summary: Read simulation status
      responses:
        '200':
          description: Simulation status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
  /simulation/results.php:
    get:
      summary: Load simulation results
      responses:
        '200':
          description: Simulation results
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessResponse'
components:
  parameters:
    ProjectId:
      name: project_id
      in: query
      required: true
      schema:
        type: integer
        minimum: 1
  responses:
    ValidationError:
      description: Validation error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ValidationErrorResponse'
    ApiError:
      description: API error
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorResponse'
  schemas:
    ProjectInput:
      type: object
      required: [name]
      properties:
        name:
          type: string
          maxLength: 150
        description:
          type: string
        production_type:
          type: string
          enum: [serial, job_shop, mixed]
        shift_length_minutes:
          type: integer
          minimum: 1
    SuccessResponse:
      type: object
      required: [success, data, message]
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string
    ValidationErrorResponse:
      type: object
      required: [success, errors]
      properties:
        success:
          type: boolean
          example: false
        errors:
          type: array
          items:
            type: object
            required: [field, message]
            properties:
              field:
                type: string
              message:
                type: string
    ErrorResponse:
      type: object
      required: [success, message, error]
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

  /api/projects/diagnostics.php:
    get:
      summary: Run project readiness diagnostics
      tags: [Projects]
      parameters:
        - in: query
          name: project_id
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Project diagnostics report
        '400':
          description: Validation error
